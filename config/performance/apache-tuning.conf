# Optimized for high-concurrency exam (event MPM + FPM)
# Apache only handles I/O, PHP runs in FPM workers
<IfModule mpm_event_module>
    StartServers             3
    MinSpareThreads         25
    MaxSpareThreads         75
    ThreadLimit             64
    ThreadsPerChild         25
    MaxRequestWorkers      400
    MaxConnectionsPerChild 10000
</IfModule>

# KeepAlive: reuse connections for AJAX calls
KeepAlive On
MaxKeepAliveRequests 200
KeepAliveTimeout 5
