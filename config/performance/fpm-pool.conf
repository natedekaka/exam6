; PHP-FPM pool tuning for 500-1000 concurrent exam takers
; Each FPM worker handles one PHP request at a time
; Apache proxies PHP requests to FPM via TCP

[www]
pm = dynamic
pm.max_children = 200
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Timeout settings
request_terminate_timeout = 300s
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

; Security: prevent dangerous functions
php_admin_value[disable_functions] = exec, system, shell_exec, passthru, popen, proc_open
